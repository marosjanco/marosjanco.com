<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 232" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa6b8"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f3a68" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="856" height="228" rx="16" fill="#f6f4ee" stroke="#e6e1d6"/>
  <text x="30" y="36" fill="#1f3a68" font-size="12" font-weight="700" letter-spacing="1.6">FROM CLAUDE.MD TO A FILESYSTEM &#183; ONE YEAR</text>

  <!-- arrows behind cards -->
  <g stroke="#9aa6b8" stroke-width="1.6" marker-end="url(#ah)">
    <line x1="213" y1="136" x2="231" y2="136"/>
    <line x1="420" y1="136" x2="438" y2="136"/>
    <line x1="627" y1="136" x2="645" y2="136"/>
  </g>

  <!-- Card 1 -->
  <g filter="url(#sh)">
    <rect x="28" y="76" width="183" height="120" rx="12" fill="#ffffff" stroke="#e2ddd2"/>
  </g>
  <text x="44" y="108" fill="#1f3a68" font-size="16" font-weight="700">CLAUDE.md</text>
  <text x="44" y="131" fill="#3a3833" font-size="12.5">Markdown instructions</text>
  <text x="44" y="148" fill="#3a3833" font-size="12.5">injected at session start.</text>
  <text x="44" y="180" fill="#9a5b4a" font-size="11.5">&#8627; bloats as it grows</text>

  <!-- Card 2 -->
  <g filter="url(#sh)">
    <rect x="235" y="76" width="183" height="120" rx="12" fill="#ffffff" stroke="#e2ddd2"/>
  </g>
  <text x="251" y="108" fill="#1f3a68" font-size="16" font-weight="700">Memory tools</text>
  <text x="251" y="131" fill="#3a3833" font-size="12.5">Agent reads / writes its</text>
  <text x="251" y="148" fill="#3a3833" font-size="12.5">own memory, in-band.</text>
  <text x="251" y="180" fill="#9a5b4a" font-size="11.5">&#8627; no cross-session view</text>

  <!-- Card 3 -->
  <g filter="url(#sh)">
    <rect x="442" y="76" width="183" height="120" rx="12" fill="#ffffff" stroke="#e2ddd2"/>
  </g>
  <text x="458" y="108" fill="#1f3a68" font-size="16" font-weight="700">Skills</text>
  <text x="458" y="131" fill="#3a3833" font-size="12.5">Progressive disclosure &#8212;</text>
  <text x="458" y="148" fill="#3a3833" font-size="12.5">load detail on demand.</text>
  <text x="458" y="180" fill="#9a5b4a" font-size="11.5">&#8627; human-curated</text>

  <!-- Card 4 (state of the art) -->
  <g filter="url(#sh)">
    <rect x="649" y="76" width="183" height="120" rx="12" fill="#eef2f8" stroke="#1f3a68" stroke-width="1.5"/>
  </g>
  <text x="665" y="108" fill="#1f3a68" font-size="16" font-weight="700">Memory = files</text>
  <text x="665" y="131" fill="#3a3833" font-size="12.5">Markdown + grep / bash,</text>
  <text x="665" y="148" fill="#3a3833" font-size="12.5">indexed &amp; searchable.</text>
  <rect x="665" y="168" width="118" height="19" rx="9.5" fill="#1f3a68"/>
  <text x="724" y="181" fill="#ffffff" font-size="10.5" font-weight="700" letter-spacing="0.8" text-anchor="middle">STATE OF THE ART</text>
</svg>
